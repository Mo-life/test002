name: 导出ARM64 Docker前端镜像
on:
  workflow_dispatch:
jobs:
  build-arm64-front:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Docker环境
        uses: docker/setup-buildx-action@v3

      - name: 拉取原生arm64 nginx基础镜像
        run: docker pull --platform linux/arm64 nginx:alpine

      - name: 构建taiga-front:custom ARM64镜像
        run: |
          docker build \
            --platform linux/arm64 \
            -f ./Dockerfile.front \
            -t taiga-front:custom \
            .

      - name: 导出离线镜像tar包
        run: docker save -o taiga-front-arm64.tar taiga-front:custom

      - name: 上传镜像包为流水线制品
        uses: actions/upload-artifact@v4
        with:
          name: taiga-front-arm64-image
          path: taiga-front-arm64.tar
          retention-days: 30
