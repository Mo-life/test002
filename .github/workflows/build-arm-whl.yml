name: 生成ARM64 Python依赖包
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 核心：检出仓库代码，拿到requirements.txt
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 启用QEMU ARM模拟
        uses: docker/setup-qemu-action@v3

      - name: ARM64环境下载全部依赖whl包
        run: |
          docker run --rm \
            -v $PWD:/work \
            --platform linux/arm64 python:3.11-slim \
            bash -c "
              cd /work
              pip wheel -r requirements.txt -w ./whl
            "

      - name: 打包whl依赖包
        run: zip -r taiga-back-whl-arm64.zip whl/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: taiga-back-whl-arm64
          path: taiga-back-whl-arm64.zip
